<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapak Desa Lainungan</title>
    
    <!-- Memanggil Framework Tailwind CSS agar desain otomatis rapi -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Memanggil Library PapaParse untuk membaca file CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

    <!-- Bagian Header (Kepala Website) -->
    <header class="bg-green-700 text-white text-center py-12 px-4 shadow-lg">
        <h1 class="text-4xl font-bold mb-2">Lapak Desa Lainungan</h1>
        <p class="text-lg font-light">Katalog Produk Unggulan & Hasil Olahan Warga Desa</p>
    </header>

    <!-- Bagian Utama Konten -->
    <main class="container mx-auto px-4 py-8 max-w-6xl">
        
        <!-- Indikator Loading & Pesan Error -->
        <div id="status-loading" class="text-center py-10 text-gray-500 text-lg animate-pulse">
            Memuat data lapak desa...
        </div>
        
        <!-- Wadah Grid untuk Katalog Produk -->
        <div id="wadah-katalog" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- Kartu produk akan di-generate oleh JavaScript di sini -->
        </div>

    </main>

    <!-- Bagian Footer (Kaki Website) -->
    <footer class="bg-gray-800 text-gray-300 text-center py-6 mt-12">
        <p>&copy; 2026 Inovasi KKN Desa Lainungan, Sidrap.</p>
    </footer>

    <!-- Logika JavaScript -->
    <script>
        // 1. LINK CSV GOOGLE SHEETS
        const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSr_Sh6mxIZFs_BdXP7zXCuEiU_FiuVcjrchMm5X8cPq8HXn2DZ2X2OQA_ObHxdVLer3dWwGdi5WVmq/pub?gid=989510176&single=true&output=csv";

        // 2. FUNGSI MENGUBAH LINK DRIVE MENJADI GAMBAR THUMBNAIL
        function formatGambarDrive(urlDrive) {
            if (!urlDrive) return "https://via.placeholder.com/400x300?text=Tidak+Ada+Foto";
            const match = urlDrive.match(/([-\w]{25,})/);
            if (match && match[1]) {
                const idGambar = match[1];
                return `https://drive.google.com/thumbnail?id=${idGambar}&sz=w800`;
            }
            return urlDrive;
        }

        // 3. PROSES PENARIKAN DATA (DENGAN PENANGANAN ERROR)
        Papa.parse(urlCSV, {
            download: true,
            header: true,
            complete: function(results) {
                try {
                    const dataLapak = results.data;
                    
                    if (!dataLapak || dataLapak.length === 0) {
                        document.getElementById("status-loading").innerText = "Data kosong atau tautan salah.";
                        document.getElementById("status-loading").classList.remove("animate-pulse");
                        return;
                    }
                    
                    document.getElementById("status-loading").classList.add("hidden");
                    document.getElementById("wadah-katalog").classList.remove("hidden");
                    
                    renderKatalog(dataLapak);
                } catch (error) {
                    console.error("Error pada saat merender data:", error);
                    document.getElementById("status-loading").innerText = "Terjadi kesalahan pada kodingan: " + error.message;
                    document.getElementById("status-loading").classList.remove("animate-pulse");
                }
            },
            error: function(err) {
                console.error("Gagal menarik data CSV:", err);
                document.getElementById("status-loading").innerText = "Gagal terhubung ke Google Sheets. Pastikan internet lancar.";
                document.getElementById("status-loading").classList.remove("animate-pulse");
            }
        });

        // 4. FUNGSI UNTUK MERAKIT KARTU PRODUK (DENGAN GRADASI)
        function renderKatalog(data) {
            const wadah = document.getElementById("wadah-katalog");
            let elemenHTML = "";

            data.forEach((produk, index) => {
                if(!produk["Nama Produk"]) return; // Lewati jika baris kosong

                const nama = produk["Nama Produk"];
                const pemilik = produk["Nama Pemilik"];
                const kategori = produk["Kategori Produk"];
                
                // Mencegah error jika kolom harga kosong
                let hargaMentah = produk["Harga (Rp)"];
                let harga = hargaMentah ? parseFloat(hargaMentah).toLocaleString('id-ID') : "0";
                
                const deskripsi = produk["Deskripsi Produk"];
                const nomorWA = produk["Nomor Whatsapp (62)"];
                const fotoAsli = produk["Foto Produk"];

                const fotoSiapRender = formatGambarDrive(fotoAsli);
                
                // Mengamankan teks dari tanda kutip agar tombol Beli tidak error
                const namaAman = nama.replace(/'/g, "\\'"); 

                elemenHTML += `
                    <div class="bg-white rounded-lg shadow-md overflow-hidden flex flex-col hover:shadow-xl transition-shadow duration-300">
                        
                        <!-- WADAH GAMBAR DENGAN EFEK GRADASI -->
                        <div class="relative w-full h-48">
                            <img src="${fotoSiapRender}" alt="${nama}" class="w-full h-full object-cover">
                            <!-- Blok gradasi: memudar dari putih (bawah) ke transparan (atas) -->
                            <div class="absolute bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-white to-transparent"></div>
                        </div>
                        
                        <!-- BAGIAN TEKS -->
                        <div class="px-5 pb-5 pt-2 flex-grow flex flex-col relative z-10">
                            <span class="text-xs font-semibold text-green-600 uppercase tracking-wider mb-1">${pemilik}</span>
                            <h3 class="text-xl font-bold text-gray-900 mb-2">${nama}</h3>
                            <p class="text-sm text-gray-500 mb-3">${kategori || ''}</p>
                            <p class="text-gray-600 text-sm mb-4 flex-grow">${deskripsi}</p>
                            
                            <div class="mb-4">
                                <span class="text-lg font-bold text-gray-900">Rp ${harga}</span>
                            </div>
                            
                            <button onclick="prosesBeli('${nomorWA}', '${namaAman}')" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition-colors duration-200">
                                Beli via WhatsApp
                            </button>
                        </div>
                    </div>
                `;
            });

            // Jika tidak ada data yang tercetak sama sekali
            if(elemenHTML === "") {
                document.getElementById("status-loading").classList.remove("hidden");
                document.getElementById("status-loading").innerText = "Kolom Nama Produk tidak ditemukan di Google Sheets. Pastikan namanya sama persis.";
                document.getElementById("wadah-katalog").classList.add("hidden");
            } else {
                wadah.innerHTML = elemenHTML;
            }
        }

        // 5. FUNGSI TRANSAKSI WHATSAPP
        function prosesBeli(nomorWA, namaProduk) {
            // Mencegah error jika warga memasukkan nomor WA pakai spasi/strip
            const nomorBersih = nomorWA.replace(/[^0-9]/g, ''); 
            
            const pesan = `Halo, saya melihat informasi dari website Lapak Desa Lainungan. Saya ingin memesan *${namaProduk}*. Apakah produk ini masih tersedia?`;
            const urlWA = `https://wa.me/${nomorBersih}?text=${encodeURIComponent(pesan)}`;
            
            window.open(urlWA, "_blank");
        }
    </script>
</body>
</html>
