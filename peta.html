<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta UMKM - Lapak Desa Talumae</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 0.75rem; border: 1px solid #e5e7eb; }
        .leaflet-popup-content { margin: 0; width: 260px !important; }
        .leaflet-popup-close-button { color: #fff !important; top: 8px !important; right: 8px !important; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 flex flex-col min-h-screen">

    <nav class="bg-white shadow-sm p-4 sticky top-0 z-[60]">
        <div class="container mx-auto max-w-6xl flex items-center justify-between">
            <a href="index.html" class="flex items-center text-green-700 hover:text-green-800 font-bold transition-colors">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Kembali ke Beranda
            </a>
            <span class="font-semibold text-gray-500 hidden sm:block">Inovasi KKN Desa Talumae</span>
        </div>
    </nav>

    <header class="bg-green-700 text-white text-center py-8 px-4 shadow-md relative z-10">
        <div class="container mx-auto max-w-6xl">
            <h1 class="text-3xl md:text-4xl font-bold mb-2">Peta Sebaran UMKM</h1>
            <p class="text-green-100">Temukan lokasi pasti etalase dan lapak warga Desa Talumae.</p>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-6xl relative z-0">
        <div id="status-loading" class="text-center py-12 text-gray-500 text-lg animate-pulse">
            <div class="text-4xl mb-3">🛰️</div>
            Memuat data lokasi dari satelit...
        </div>
        
        <div id="map" class="w-full h-[65vh] rounded-xl shadow-xl border-4 border-white hidden relative z-10"></div>
    </main>

    <footer class="bg-gray-900 text-gray-400 text-center py-6 mt-auto relative z-10">
        <p>&copy; 2026 Lapak Desa Talumae, Kabupaten Sidenreng Rappang.</p>
    </footer>

    <script>
        // ==========================================
        // GANTI DENGAN LINK CSV TABEL_TOKO ANDA!
        // ==========================================
        const URL_CSV_TOKO = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSr_Sh6mxIZFs_BdXP7zXCuEiU_FiuVcjrchMm5X8cPq8HXn2DZ2X2OQA_ObHxdVLer3dWwGdi5WVmq/pub?gid=1489445987&single=true&output=csv";

        // Fungsi memformat link gambar Drive
        function formatGambarDrive(urlDrive) {
            if (!urlDrive) return "https://via.placeholder.com/400x200?text=Tidak+Ada+Foto";
            const match = urlDrive.match(/([-\w]{25,})/);
            if (match && match[1]) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w400`;
            return urlDrive;
        }

        document.addEventListener("DOMContentLoaded", () => {
            // 1. INISIALISASI KAMERA PETA (Terpusat di Desa Talumae)
            const map = L.map('map').setView([-3.919263, 119.901488], 15);

            // 2. AMBIL DESAIN PETA (Base Map) DARI OPENSTREETMAP
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors'
            }).addTo(map);

            // 3. TARIK DATA DARI DATABASE GOOGLE SHEETS
            Papa.parse(URL_CSV_TOKO, {
                download: true,
                header: true,
                complete: function(results) {
                    const dataToko = results.data;
                    let jumlahPin = 0;

                    // Lakukan perulangan (looping) ke setiap data toko
                    dataToko.forEach(toko => {
                        const lokasi = toko["Lokasi Toko"];
                        
                        // Cek apakah kolom lokasi diisi dan menggunakan koma pembatas
                        if (lokasi && lokasi.includes(',')) {
                            // Pecah teks koordinat menjadi Latitude dan Longitude
                            const kordinat = lokasi.split(',');
                            const lat = parseFloat(kordinat[0].trim());
                            const lng = parseFloat(kordinat[1].trim());

                            // Pastikan hasilnya adalah angka nyata (bukan teks error)
                            if (!isNaN(lat) && !isNaN(lng)) {
                                jumlahPin++;
                                
                                const namaToko = toko["Nama Toko"] || "Toko Warga";
                                const kategori = toko["Kategori Produk"] || "Bermacam Kategori";
                                const foto = formatGambarDrive(toko["Perwakilan Foto Produk / Etalase"]);
                                
                                // 4. DESAIN KARTU POPUP (HTML BUNGKUSAN PIN)
                                const popupContent = `
                                    <div class="flex flex-col bg-white">
                                        <div class="relative h-32 w-full">
                                            <img src="${foto}" alt="${namaToko}" class="w-full h-full object-cover">
                                            <div class="absolute inset-0 bg-black bg-opacity-20"></div>
                                        </div>
                                        <div class="p-4 text-center">
                                            <h3 class="font-bold text-lg text-gray-900 leading-tight mb-1">${namaToko}</h3>
                                            <p class="text-xs font-semibold text-green-600 uppercase mb-4">${kategori}</p>
                                            <a href="katalog.html" class="inline-block w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-md transition-colors text-sm shadow-md">
                                                Lihat Produk Lengkap
                                            </a>
                                        </div>
                                    </div>
                                `;

                                // 5. TANJAPKAN PIN KE PETA
                                L.marker([lat, lng])
                                 .addTo(map)
                                 .bindPopup(popupContent);
                            }
                        }
                    });

                    // 6. PROSES SELESAI, TAMPILKAN PETA
                    document.getElementById("status-loading").classList.add("hidden");
                    const mapDiv = document.getElementById("map");
                    mapDiv.classList.remove("hidden");
                    
                    // Paksa Peta menyesuaikan ukuran kotaknya dengan layar (Anti-ngebug)
                    setTimeout(() => { map.invalidateSize(); }, 200);

                    // Peringatan jika belum ada warga yang input koordinat
                    if (jumlahPin === 0) {
                        document.getElementById("status-loading").classList.remove("hidden");
                        document.getElementById("status-loading").innerHTML = "Data berhasil ditarik, tetapi belum ada titik koordinat yang dimasukkan penjual.";
                    }
                },
                error: function(err) {
                    document.getElementById("status-loading").innerHTML = "Gagal memuat data dari server Google.";
                    document.getElementById("status-loading").classList.remove("animate-pulse", "text-gray-500");
                    document.getElementById("status-loading").classList.add("text-red-500");
                }
            });
        });
    </script>
</body>
</html>
